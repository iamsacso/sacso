<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1a14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="SACSO — official home. Connect on social media." />
  <title>SACSO</title>
  <link rel="icon" href="image/circle%20logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="image/circle%20logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0b1a14;
      --accent: #3dd68c;
      --accent-soft: rgba(61, 214, 140, 0.15);
      --text: #f2f7f4;
      --muted: #a8c4b6;
      --line: rgba(242, 247, 244, 0.12);
      --page-pad-x: clamp(1rem, 4vw, 1.5rem);
      --page-pad-y: clamp(1.25rem, 5vh, 2.5rem);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, #1a4d3a 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 100% 100%, #0f2e24 0%, transparent 50%),
        var(--bg-deep);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(var(--page-pad-y) + var(--safe-top))
        calc(var(--page-pad-x) + var(--safe-right))
        calc(var(--page-pad-y) + var(--safe-bottom))
        calc(var(--page-pad-x) + var(--safe-left));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      opacity: 0;
      animation: rise 0.8s ease forwards;
    }

    .logo {
      width: clamp(88px, 24vw, 110px);
      height: clamp(88px, 24vw, 110px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--line);
      box-shadow: 0 0 0 8px var(--accent-soft);
      transition: box-shadow 0.35s ease;
      will-change: transform;
    }

    .logo:hover {
      box-shadow: 0 0 0 12px var(--accent-soft);
    }

    .brand {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(2.1rem, 9vw, 3.2rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 0.55rem;
      opacity: 0;
      animation: rise 0.8s ease 0.12s forwards;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      line-height: 1.5;
      margin-bottom: clamp(1.5rem, 4vw, 2.25rem);
      padding-inline: 0.25rem;
      opacity: 0;
      animation: rise 0.8s ease 0.22s forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: clamp(0.65rem, 2vw, 0.75rem);
      width: 100%;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-height: 52px;
      padding: 0.9rem 1.1rem;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(18, 53, 42, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-weight: 500;
      font-size: clamp(0.92rem, 3.6vw, 0.98rem);
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
      opacity: 0;
      animation: rise 0.7s ease forwards;
      touch-action: manipulation;
    }

    .link:nth-child(1) { animation-delay: 0.32s; }
    .link:nth-child(2) { animation-delay: 0.4s; }
    .link:nth-child(3) { animation-delay: 0.48s; }
    .link:nth-child(4) { animation-delay: 0.56s; }

    .link:hover {
      border-color: var(--accent);
      background: rgba(61, 214, 140, 0.1);
      transform: translateY(-2px);
    }

    .link:active {
      border-color: var(--accent);
      background: rgba(61, 214, 140, 0.16);
      transform: scale(0.98);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .link svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: var(--accent);
    }

    .link span {
      flex: 1;
      text-align: left;
    }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .link:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .footer {
      margin-top: clamp(1.5rem, 4vw, 2rem);
      padding-bottom: 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0;
      animation: rise 0.8s ease 0.85s forwards;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Phones & small tablets */
    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: calc(1.75rem + var(--safe-top));
      }

      .page {
        width: 100%;
        max-width: 100%;
        padding-bottom: 0.5rem;
      }

      .logo {
        box-shadow: 0 0 0 6px var(--accent-soft);
      }

      .link {
        min-height: 54px;
        padding: 1rem 1.05rem;
        border-radius: 16px;
        gap: 0.95rem;
      }

      .link svg {
        width: 24px;
        height: 24px;
      }
    }

    /* Very small screens */
    @media (max-width: 360px) {
      .brand {
        font-size: 2rem;
      }

      .link {
        padding: 0.9rem 0.95rem;
        font-size: 0.9rem;
      }
    }

    /* Short landscape phones */
    @media (max-height: 520px) and (orientation: landscape) {
      body {
        align-items: flex-start;
        padding-block: calc(1rem + var(--safe-top)) calc(1rem + var(--safe-bottom));
      }

      .logo-wrap {
        margin-bottom: 0.75rem;
      }

      .logo {
        width: 64px;
        height: 64px;
      }

      .brand {
        font-size: 1.75rem;
      }

      .tagline {
        margin-bottom: 1rem;
      }

      .links {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.55rem;
      }

      .link {
        min-height: 48px;
        padding: 0.7rem 0.85rem;
      }

      .footer {
        margin-top: 1rem;
      }
    }

    /* Touch devices: no hover stickiness, no mouse parallax needed */
    @media (hover: none) {
      .link:hover {
        transform: none;
        border-color: var(--line);
        background: rgba(18, 53, 42, 0.45);
      }

      .link:hover .arrow {
        transform: none;
        color: var(--muted);
      }

      .link:active {
        border-color: var(--accent);
        background: rgba(61, 214, 140, 0.16);
        transform: scale(0.98);
      }

      .link:active .arrow {
        color: var(--accent);
      }

      .logo:hover {
        box-shadow: 0 0 0 8px var(--accent-soft);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-wrap,
      .brand,
      .tagline,
      .link,
      .footer {
        animation: none;
        opacity: 1;
      }

      .logo {
        transform: none !important;
      }

      .link:active {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="logo-wrap">
      <img class="logo" src="image/circle%20logo.png" alt="SACSO logo" width="110" height="110" />
    </div>

    <h1 class="brand">SACSO</h1>
    <p class="tagline">Creator · Builder · Storyteller</p>

    <nav class="links" aria-label="Social links">
      <!-- Apne real profile URLs yahan set karo -->
      <a class="link" href="https://instagram.com/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 3.2.1 4.7 1.7 4.8 4.8.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 3.1-1.6 4.7-4.8 4.8-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-3.2-.1-4.7-1.7-4.8-4.8C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.9C2.4 3.9 4 2.4 7.1 2.3 8.4 2.2 8.8 2.2 12 2.2m0-2.2C8.7 0 8.3 0 7 0 3.4.1.1 3.4 0 7v10c.1 3.6 3.4 6.9 7 7h10c3.6-.1 6.9-3.4 7-7V7c-.1-3.6-3.4-6.9-7-7H12zm0 5.4a6.6 6.6 0 1 0 0 13.2 6.6 6.6 0 0 0 0-13.2zm0 10.9a4.3 4.3 0 1 1 0-8.6 4.3 4.3 0 0 1 0 8.6zm6.8-11.2a1.5 1.5 0 1 0 0 3.1 1.5 1.5 0 0 0 0-3.1z"/></svg>
        <span>Instagram</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <a class="link" href="https://youtube.com/@YOUR_USERNAME" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8zM9.8 15.5v-7l6.3 3.5-6.3 3.5z"/></svg>
        <span>YouTube</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <a class="link" href="https://linkedin.com/in/YOUR_USERNAME" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 2h-17A1.5 1.5 0 0 0 2 3.5v17A1.5 1.5 0 0 0 3.5 22h17a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 20.5 2zM8 19H5v-9h3v9zM6.5 8.3A1.8 1.8 0 1 1 6.5 4.8a1.8 1.8 0 0 1 0 3.5zM19 19h-3v-4.4c0-1.1 0-2.4-1.5-2.4s-1.7 1.2-1.7 2.3V19h-3v-9h2.9v1.2h.1c.4-.8 1.4-1.5 2.8-1.5 3 0 3.6 2 3.6 4.5V19z"/></svg>
        <span>LinkedIn</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <a class="link" href="mailto:hello@sacso.dev">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5v2z"/></svg>
        <span>Email</span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </nav>

    <p class="footer">© <span id="year"></span> SACSO</p>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const logo = document.querySelector(".logo");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    // Parallax only on desktop mouse — phones pe skip
    if (!reduceMotion && canHover && logo) {
      document.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 8;
        const y = (e.clientY / window.innerHeight - 0.5) * 8;
        logo.style.transform = `translate(${x}px, ${y}px)`;
      });
    }
  </script>
</body>
</html>
